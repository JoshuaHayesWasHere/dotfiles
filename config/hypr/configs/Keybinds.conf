# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */ 
# Default Keybinds
# visit https://wiki.hyprland.org/Configuring/Binds/ for more info

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserConfigs = $HOME/.config/hypr/UserConfigs
$UserScripts = $HOME/.config/hypr/UserScripts

bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0 # exit Hyprland
bind = $mainMod, Q, killactive, # close active (not kill)
bind = $mainMod SHIFT, Q, exec, $scriptsDir/KillActiveProcess.sh # Kill active process
bind = CTRL ALT, L, exec, $scriptsDir/LockScreen.sh # screen lock
bind = CTRL ALT, P, exec, $scriptsDir/Wlogout.sh # power menu
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw # swayNC notification panel
bind = $mainMod SHIFT, E, exec, $scriptsDir/Kool_Quick_Settings.sh # Settings Menu KooL Hyprland Settings

# Master Layout
bind = $mainMod CTRL, D, layoutmsg, removemaster
bind = $mainMod, I, layoutmsg, addmaster
bind = $mainMod, J, layoutmsg, cyclenext
bind = $mainMod, K, layoutmsg, cycleprev
bind = $mainMod CTRL, Return, layoutmsg, swapwithmaster

# Dwindle Layout
bind = $mainMod SHIFT, I, togglesplit # only works on dwindle layout
bind = $mainMod, P, pseudo, # dwindle

# Works on either layout (Master or Dwindle)
bind = $mainMod, M, exec, hyprctl dispatch splitratio 0.3

# group
bind = $mainMod, G, togglegroup # toggle group
bind = $mainMod CTRL, tab, changegroupactive  # change focus to another window

 # Cycle windows if floating bring to top
bind = ALT, tab, cyclenext
bind = ALT, tab, bringactivetotop  

# Special Keys / Hot Keys
bindel = , xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc # volume up
bindel = , xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec # volume down
bindl = , xf86AudioMicMute, exec, $scriptsDir/Volume.sh --toggle-mic # mic mute
bindl = , xf86audiomute, exec, $scriptsDir/Volume.sh --toggle # mute
bindl = , xf86Sleep, exec, systemctl suspend  # sleep button 
bindl = , xf86Rfkill, exec, $scriptsDir/AirplaneMode.sh # Airplane mode

# media controls using keyboards
bindl = , xf86AudioPlayPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioPlay, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioNext, exec, $scriptsDir/MediaCtrl.sh --nxt 
bindl = , xf86AudioPrev, exec, $scriptsDir/MediaCtrl.sh --prv
bindl = , xf86audiostop, exec, $scriptsDir/MediaCtrl.sh --stop

# Screenshot keybindings NOTE: You may need to press Fn key as well
bind = $mainMod, Print, exec, $scriptsDir/ScreenShot.sh --now  # screenshot
bind = $mainMod SHIFT, Print, exec, $scriptsDir/ScreenShot.sh --area # screenshot (area)
bind = $mainMod CTRL, Print, exec, $scriptsDir/ScreenShot.sh --in5 # screenshot  (5 secs delay)
bind = $mainMod CTRL SHIFT, Print, exec, $scriptsDir/ScreenShot.sh --in10 # screenshot (10 secs delay)
bind = ALT, Print, exec, $scriptsDir/ScreenShot.sh --active # screenshot (active window only)

# screenshot with swappy (another screenshot tool)
bind = $mainMod SHIFT, S, exec, $scriptsDir/ScreenShot.sh --swappy #screenshot (swappy)

# Resize windows
binde = $mainMod SHIFT, left, resizeactive,-50 0
binde = $mainMod SHIFT, right, resizeactive,50 0
binde = $mainMod SHIFT, up, resizeactive,0 -50
binde = $mainMod SHIFT, down, resizeactive,0 50

# Move windows
bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, l, movewindow, r
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, j, movewindow, d

# Swap windows
bind = $mainMod ALT, left, swapwindow, l
bind = $mainMod ALT, right, swapwindow, r
bind = $mainMod ALT, up, swapwindow, u
bind = $mainMod ALT, down, swapwindow, d

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, j, movefocus, u
bind = $mainMod, k, movefocus, d

# Workspaces related
bind = $mainMod, tab, workspace, m+1
bind = $mainMod SHIFT, tab, workspace, m-1

# Special workspace
bind = $mainMod SHIFT, U, movetoworkspace, special
bind = $mainMod, U, togglespecialworkspace,

# Per-monitor workspaces: each monitor has its own 1-10 (1-5 always shown, 6-10 appear when used).
# code:10..19 = keys 1..0. The dispatcher resolves these to the right global ID
# based on which monitor is currently focused.

# Switch to workspace N on the focused monitor
bind = $mainMod, code:10, exec, $scriptsDir/WorkspaceOnMonitor.sh focus 1
bind = $mainMod, code:11, exec, $scriptsDir/WorkspaceOnMonitor.sh focus 2
bind = $mainMod, code:12, exec, $scriptsDir/WorkspaceOnMonitor.sh focus 3
bind = $mainMod, code:13, exec, $scriptsDir/WorkspaceOnMonitor.sh focus 4
bind = $mainMod, code:14, exec, $scriptsDir/WorkspaceOnMonitor.sh focus 5
bind = $mainMod, code:15, exec, $scriptsDir/WorkspaceOnMonitor.sh focus 6
bind = $mainMod, code:16, exec, $scriptsDir/WorkspaceOnMonitor.sh focus 7
bind = $mainMod, code:17, exec, $scriptsDir/WorkspaceOnMonitor.sh focus 8
bind = $mainMod, code:18, exec, $scriptsDir/WorkspaceOnMonitor.sh focus 9
bind = $mainMod, code:19, exec, $scriptsDir/WorkspaceOnMonitor.sh focus 10

# Move active window to workspace N on the focused monitor and follow
bind = $mainMod SHIFT, code:10, exec, $scriptsDir/WorkspaceOnMonitor.sh move 1
bind = $mainMod SHIFT, code:11, exec, $scriptsDir/WorkspaceOnMonitor.sh move 2
bind = $mainMod SHIFT, code:12, exec, $scriptsDir/WorkspaceOnMonitor.sh move 3
bind = $mainMod SHIFT, code:13, exec, $scriptsDir/WorkspaceOnMonitor.sh move 4
bind = $mainMod SHIFT, code:14, exec, $scriptsDir/WorkspaceOnMonitor.sh move 5
bind = $mainMod SHIFT, code:15, exec, $scriptsDir/WorkspaceOnMonitor.sh move 6
bind = $mainMod SHIFT, code:16, exec, $scriptsDir/WorkspaceOnMonitor.sh move 7
bind = $mainMod SHIFT, code:17, exec, $scriptsDir/WorkspaceOnMonitor.sh move 8
bind = $mainMod SHIFT, code:18, exec, $scriptsDir/WorkspaceOnMonitor.sh move 9
bind = $mainMod SHIFT, code:19, exec, $scriptsDir/WorkspaceOnMonitor.sh move 10
bind = $mainMod SHIFT, bracketleft, movetoworkspace, -1 # brackets [
bind = $mainMod SHIFT, bracketright, movetoworkspace, +1 # brackets ]

# Move active window silently to workspace N on the focused monitor
bind = $mainMod CTRL, code:10, exec, $scriptsDir/WorkspaceOnMonitor.sh movesilent 1
bind = $mainMod CTRL, code:11, exec, $scriptsDir/WorkspaceOnMonitor.sh movesilent 2
bind = $mainMod CTRL, code:12, exec, $scriptsDir/WorkspaceOnMonitor.sh movesilent 3
bind = $mainMod CTRL, code:13, exec, $scriptsDir/WorkspaceOnMonitor.sh movesilent 4
bind = $mainMod CTRL, code:14, exec, $scriptsDir/WorkspaceOnMonitor.sh movesilent 5
bind = $mainMod CTRL, code:15, exec, $scriptsDir/WorkspaceOnMonitor.sh movesilent 6
bind = $mainMod CTRL, code:16, exec, $scriptsDir/WorkspaceOnMonitor.sh movesilent 7
bind = $mainMod CTRL, code:17, exec, $scriptsDir/WorkspaceOnMonitor.sh movesilent 8
bind = $mainMod CTRL, code:18, exec, $scriptsDir/WorkspaceOnMonitor.sh movesilent 9
bind = $mainMod CTRL, code:19, exec, $scriptsDir/WorkspaceOnMonitor.sh movesilent 10
bind = $mainMod CTRL, bracketleft, movetoworkspacesilent, -1 # brackets [
bind = $mainMod CTRL, bracketright, movetoworkspacesilent, +1 # brackets ]

# Swap window contents between the two monitors' active workspaces
bind = $mainMod SHIFT, M, exec, $scriptsDir/SwapMonitorContents.sh

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, period, workspace, e+1
bind = $mainMod, comma, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow # NOTE: mouse:272 = left click
bindm = $mainMod, mouse:273, resizewindow # NOTE: mouse:272 = right click
